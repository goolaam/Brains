<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Chain Reaction: 20 Levels</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: #16213e;
            --text: #e94560;
            --accent: #0f3460;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #game-container {
            width: 100%;
            max-width: 600px;
            background: var(--panel);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        #scene-description {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 20px;
            min-height: 80px;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        select, button {
            padding: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        select { background: #fff; color: #333; }
        button { background: var(--text); color: #fff; transition: 0.2s; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        #inventory-display {
            margin-top: 20px;
            padding: 10px;
            background: var(--accent);
            border-radius: 8px;
            font-size: 0.9rem;
        }
        #message-log {
            margin-top: 15px;
            color: #aaa;
            font-style: italic;
            font-size: 0.85rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="header">
            <span>Level: <strong id="level-num">1</strong>/20</span>
            <span id="location-name">The Forest Edge</span>
        </div>

        <div id="scene-description">
            A heavy boulder blocks the cave entrance. A sturdy wooden log lies nearby.
        </div>

        <div class="controls">
            <select id="item-select">
                <option value="">-- Use Item --</option>
            </select>
            <select id="target-select">
                <option value="">-- On Target --</option>
            </select>
            <button onclick="attemptAction()" style="grid-column: span 2;">Execute Action</button>
        </div>

        <div id="inventory-display">Inventory: <span id="items-list">Log</span></div>
        <div id="message-log">Can you find the way out?</div>
    </div>

<script>
    const levels = [
        { n: 1, loc: "Forest", desc: "A heavy boulder blocks the cave entrance. A sturdy log lies nearby.", item: "Log", target: "Boulder", win: "You use the log as a lever to roll the stone away, revealing a key!", nextItem: "Silver Key" },
        { n: 2, loc: "Cave Mouth", desc: "A locked iron gate stands in your way.", item: "Silver Key", target: "Iron Gate", win: "The key turns perfectly. The gate creaks open.", nextItem: "Empty Bucket" },
        { n: 3, loc: "The Well", desc: "A deep well sits in the center of the room. You can see something shiny at the bottom but can't reach it.", item: "Empty Bucket", target: "Well", win: "You lower the bucket and scoop up a handful of wet Flint.", nextItem: "Flint" },
        { n: 4, loc: "Dark Hallway", desc: "It's pitch black. Unlit torches line the walls. There's a pile of dry hay.", item: "Flint", target: "Dry Hay", win: "You strike the flint. The hay catches fire, lighting a torch!", nextItem: "Lit Torch" },
        { n: 5, loc: "Frozen Door", desc: "The door handle is encased in thick magical ice.", item: "Lit Torch", target: "Ice", win: "The ice melts into a puddle, revealing a rusty Gear.", nextItem: "Rusty Gear" },
        { n: 6, loc: "The Clockworks", desc: "A massive machine is missing a crucial component to move the bridge.", item: "Rusty Gear", target: "Machine", win: "The gears grind to life. The bridge lowers.", nextItem: "Long Rope" },
        { n: 7, loc: "The Chasm", desc: "A wide gap prevents you from crossing. A sturdy hook hangs from the ceiling.", item: "Long Rope", target: "Hook", win: "You swing across like a pro! You land near a Magnetic Stone.", nextItem: "Magnetic Stone" },
        { n: 8, loc: "The Grate", desc: "A small metal pin is stuck deep inside a narrow pipe where your fingers can't reach.", item: "Magnetic Stone", target: "Pipe", win: "The magnet pulls the pin out! It's actually a Lockpick.", nextItem: "Lockpick" },
        { n: 9, loc: "Prison Cell", desc: "A sturdy wooden chest is double-locked.", item: "Lockpick", target: "Chest", win: "Click! Inside the chest you find a Jar of Grease.", nextItem: "Jar of Grease" },
        { n: 10, loc: "Rusted Lever", desc: "A giant lever is stuck fast by years of rust. It needs to be pulled to open the floor hatch.", item: "Jar of Grease", target: "Lever", win: "The grease works wonders. You pull the lever and find a Glass Lens.", nextItem: "Glass Lens" },
        { n: 11, loc: "The Library", desc: "A beam of light enters the room, but it's too weak to read the secret map on the wall.", item: "Glass Lens", target: "Beam of Light", win: "The lens focuses the light, burning a hole through the map to reveal a hidden Hammer.", nextItem: "Hammer" },
        { n: 12, loc: "Bricked Wall", desc: "One brick looks loose, but it's wedged tight.", item: "Hammer", target: "Loose Brick", win: "You smash the brick! Behind it lies a pile of Meat.", nextItem: "Meat" },
        { n: 13, loc: "The Kennel", desc: "A hungry, growling wolf blocks the staircase.", item: "Meat", target: "Wolf", win: "The wolf happily takes the snack and lets you pass. You find a File.", nextItem: "File" },
        { n: 14, loc: "The Bars", desc: "Thin window bars are the only thing between you and the balcony.", item: "File", target: "Bars", win: "You saw through the bars. On the balcony, you find a Mirror.", nextItem: "Mirror" },
        { n: 15, loc: "The Medusa Room", desc: "A stone statue blocks the path. Legend says it only moves if it sees its own reflection.", item: "Mirror", target: "Statue", win: "The statue turns to stone... wait, it was already stone. It crumbles! You find a Golden Seed.", nextItem: "Golden Seed" },
        { n: 16, loc: "The Garden", desc: "An enchanted plot of soil sits under a magical sunlamp.", item: "Golden Seed", target: "Soil", win: "The seed grows instantly into a beanstalk! You climb up and find an Axe.", nextItem: "Axe" },
        { n: 17, loc: "The Attic", desc: "Thick thorny vines cover the exit door.", item: "Axe", target: "Vines", win: "You chop through the thorns. Underneath is a bucket of Blue Paint.", nextItem: "Blue Paint" },
        { n: 18, loc: "The Canvas", desc: "A magical painting of an ocean is missing its color, preventing you from 'entering' the world.", item: "Blue Paint", target: "Painting", win: "The painting comes to life! You step through and find a Trident.", nextItem: "Trident" },
        { n: 19, loc: "Underwater Gate", desc: "A giant sea serpent guards the final portal. It only respects the symbol of the king.", item: "Trident", target: "Serpent", win: "The serpent bows and hands you the Final Emblem.", nextItem: "Final Emblem" },
        { n: 20, loc: "The Final Door", desc: "The exit to the real world. It requires the Final Emblem to activate.", item: "Final Emblem", target: "Exit Door", win: "The door glows and opens. You are FREE!", nextItem: "Freedom" }
    ];

    let currentLevel = 0;
    let inventory = ["Log"];

    const sceneDesc = document.getElementById('scene-description');
    const levelNum = document.getElementById('level-num');
    const locName = document.getElementById('location-name');
    const itemSelect = document.getElementById('item-select');
    const targetSelect = document.getElementById('target-select');
    const invDisplay = document.getElementById('items-list');
    const msgLog = document.getElementById('message-log');

    function updateUI() {
        const lvl = levels[currentLevel];
        if (!lvl) return;

        levelNum.innerText = lvl.n;
        locName.innerText = lvl.loc;
        sceneDesc.innerText = lvl.desc;
        invDisplay.innerText = inventory.join(", ");

        // Update dropdowns
        itemSelect.innerHTML = '<option value="">-- Use Item --</option>';
        inventory.forEach(item => {
            itemSelect.innerHTML += `<option value="${item}">${item}</option>`;
        });

        targetSelect.innerHTML = '<option value="">-- On Target --</option>';
        const target = lvl.target;
        targetSelect.innerHTML += `<option value="${target}">${target}</option>`;
    }

    function attemptAction() {
        const selectedItem = itemSelect.value;
        const selectedTarget = targetSelect.value;
        const lvl = levels[currentLevel];

        if (selectedItem === lvl.item && selectedTarget === lvl.target) {
            msgLog.innerText = lvl.win;
            msgLog.style.color = "#4cd137";
            
            setTimeout(() => {
                if (currentLevel < levels.length - 1) {
                    inventory.push(lvl.nextItem);
                    currentLevel++;
                    updateUI();
                    msgLog.innerText = "Level Cleared!";
                    msgLog.style.color = "#aaa";
                } else {
                    sceneDesc.innerText = "CONGRATULATIONS! You have escaped the 20 levels of logic!";
                    document.querySelector('.controls').style.display = 'none';
                }
            }, 2000);
        } else {
            msgLog.innerText = "That doesn't seem to work here.";
            msgLog.style.color = "#e94560";
        }
    }

    updateUI();
</script>
</body>
</html>
