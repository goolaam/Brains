<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICON BREACH: 30 LEVELS</title>
    <style>
        :root {
            --neon: #00ff41;
            --bg: #050505;
            --panel: #111;
            --crit: #ff0055;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--neon);
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Status Bar */
        .header {
            padding: 10px 15px;
            background: var(--panel);
            border-bottom: 2px solid var(--neon);
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* Main Game Stage */
        .stage {
            flex: 1;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #lvl-title { font-size: 1.3rem; margin-bottom: 10px; color: var(--neon); text-shadow: 0 0 5px var(--neon); }
        #scene-text { font-size: 1.1rem; color: #fff; line-height: 1.4; min-height: 100px; }

        /* Interaction Controls */
        .controls {
            padding: 20px;
            background: var(--panel);
            border-top: 1px solid #333;
        }

        select {
            width: 100%;
            padding: 15px;
            background: #000;
            color: var(--neon);
            border: 2px solid var(--neon);
            margin-bottom: 15px;
            font-size: 1rem;
            border-radius: 8px;
        }

        .exec-btn {
            width: 100%;
            padding: 18px;
            background: var(--neon);
            color: #000;
            font-weight: 900;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        /* Visual Inventory Tray */
        .inventory-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55%;
            background: #000;
            border-top: 4px solid var(--neon);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            z-index: 100;
            display: flex;
            flex-direction: column;
        }
        .inventory-drawer.open { transform: translateY(0); }

        .drawer-handle {
            padding: 15px;
            background: var(--neon);
            color: #000;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 15px;
            overflow-y: auto;
        }

        .item-slot {
            aspect-ratio: 1/1;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #111;
            border-radius: 8px;
        }
        .item-slot span { font-size: 1.8rem; }
        .item-slot.selected { border: 2px solid var(--neon); background: rgba(0, 255, 65, 0.1); }
        .item-label { font-size: 0.5rem; margin-top: 4px; color: #666; text-align: center; }

        #active-display {
            text-align: center;
            padding: 5px;
            font-size: 0.8rem;
            background: #222;
        }

        .shake { animation: shake 0.3s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div>HP: <span id="hp">100%</span></div>
        <div>LVL: <span id="lvl-count">1</span>/30</div>
        <div><span id="timer">10:00</span></div>
    </div>

    <div id="active-display">SELECTED: <span id="cur-item-name" style="color:var(--neon)">NONE</span></div>

    <main class="stage" id="stage">
        <h2 id="lvl-title">SCANNING...</h2>
        <p id="scene-text">Select your gear from the Utility Belt below to begin the breach.</p>
    </main>

    <div class="controls">
        <select id="target-list"></select>
        <button class="exec-btn" onclick="processMove()">EXECUTE BREACH</button>
        <p style="text-align:center; margin-top:15px; font-weight:bold;" onclick="toggleDrawer()">
            [ 🛠️ OPEN UTILITY BELT ]
        </p>
    </div>

    <div class="inventory-drawer" id="drawer">
        <div class="drawer-handle" onclick="toggleDrawer()">CLOSE UTILITY BELT</div>
        <div class="inventory-grid" id="inv-grid"></div>
    </div>

<script>
    // 30 Items with specialized Icons
    const inventoryData = [
        { name: "Sledgehammer", icon: "🔨" }, { name: "Lockpick", icon: "🔑" }, 
        { name: "Silk Rope", icon: "🪢" }, { name: "Vial of Acid", icon: "🧪" },
        { name: "Golden Key", icon: "🗝️" }, { name: "Magnifying Glass", icon: "🔍" },
        { name: "Wooden Plank", icon: "🪵" }, { name: "Steel File", icon: "🔪" },
        { name: "Heavy Grease", icon: "🧼" }, { name: "Meat Scrap", icon: "🥩" },
        { name: "Small Magnet", icon: "🧲" }, { name: "Glass Prism", icon: "💎" },
        { name: "Flint & Steel", icon: "🔥" }, { name: "Iron Crowbar", icon: "🏗️" },
        { name: "Hand Drill", icon: "⚙️" }, { name: "Rubber Gloves", icon: "🧤" },
        { name: "Compass", icon: "🧭" }, { name: "Jar of Honey", icon: "🍯" },
        { name: "Bag of Sand", icon: "⌛" }, { name: "Metal Shield", icon: "🛡️" },
        { name: "Whistle", icon: "😗" }, { name: "Blue Chalk", icon: "🖍️" },
        { name: "Empty Bucket", icon: "🪣" }, { name: "Pitchfork", icon: "🍴" },
        { name: "Silver Mirror", icon: "🪞" }, { name: "Insulated Pliers", icon: "✂️" },
        { name: "Leather Belt", icon: "➰" }, { name: "Old Bone", icon: "🦴" },
        { name: "Bamboo Pole", icon: "🎋" }, { name: "Diamond Cutter", icon: "✨" }
    ];

    const gameLevels = [
        { t: "The Barrier", d: "A heavy granite boulder blocks the hatch. It's too heavy to lift by hand.", i: "Iron Crowbar", tr: "Granite Boulder" },
        { t: "Rusted Gate", d: "The padlock has rusted into a solid block of orange metal. It won't turn.", i: "Vial of Acid", tr: "Rusted Padlock" },
        { t: "The Chasm", d: "A 10ft hole in the floor stops you. Spikes glint at the bottom.", i: "Wooden Plank", tr: "10ft Hole" },
        { t: "Pipe Glint", d: "A shiny metal component is stuck at the bottom of a 3-inch wide pipe.", i: "Small Magnet", tr: "Narrow Pipe" },
        { t: "Guard Beast", d: "A skeletal cyber-hound is growling, ready to pounce if you move.", i: "Old Bone", tr: "Cyber-Hound" },
        { t: "Walled Vent", d: "The air vent is sealed with loose bricks and old mortar.", i: "Sledgehammer", tr: "Bricked Vent" },
        { t: "Mirror Laser", d: "A deadly red laser blocks the doorway. It needs to be redirected.", i: "Silver Mirror", tr: "Red Laser" },
        { t: "High Switch", d: "The emergency power switch is 12 feet up on the ceiling.", i: "Bamboo Pole", tr: "Ceiling Switch" },
        { t: "Electric Lock", d: "The keypad is broken and sparking with lethal blue electricity.", i: "Rubber Gloves", tr: "Sparking Keypad" },
        { t: "Glass Lock", d: "A sound-sensitive lock needs a high-pitched vibration to shatter.", i: "Whistle", tr: "Vibration Sensor" },
        { t: "Dry Gears", d: "The massive blast door gears are screaming and won't move an inch.", i: "Heavy Grease", tr: "Blast Door Gears" },
        { t: "Micro Map", d: "The code is written in tiny, microscopic letters on a scrap of paper.", i: "Magnifying Glass", tr: "Microscopic Paper" },
        { t: "Icy Slope", d: "The ramp is covered in slick oil. You can't get any grip to climb.", i: "Bag of Sand", tr: "Oily Ramp" },
        { t: "Bored Guard", d: "A hungry guard is blocking the stairs, looking for a snack.", i: "Meat Scrap", tr: "Hungry Guard" },
        { t: "Fire Tunnel", d: "Flame jets are shooting across the hallway. You need cover.", i: "Metal Shield", tr: "Flame Jets" },
        { t: "Dark Void", d: "The room is pitch black. You need to start a small signal fire.", i: "Flint & Steel", tr: "Signal Fire" },
        { t: "Sludge Tank", d: "The exit key is at the bottom of a tank of black sludge.", i: "Empty Bucket", tr: "Sludge Tank" },
        { t: "Secure Drive", d: "The data drive is inside a box made of 2-inch thick glass.", i: "Diamond Cutter", tr: "Thick Glass Box" },
        { t: "Wiring Mesh", d: "A mess of live wires is blocking the computer port.", i: "Insulated Pliers", tr: "Live Wires" },
        { t: "Iron Cage", d: "One iron bar in your path is slightly corroded and thinner than the rest.", i: "Steel File", tr: "Thin Iron Bar" },
        { t: "Huge Bolt", d: "A massive hexagonal nut needs to be turned, but it's too wide for fingers.", i: "Leather Belt", tr: "Large Nut" },
        { t: "Sticky Trap", d: "A pressure plate needs to be triggered from a distance with something sticky.", i: "Jar of Honey", tr: "Pressure Plate" },
        { t: "The Well", d: "The portal trigger is at the bottom of a 30ft vertical shaft.", i: "Silk Rope", tr: "30ft Shaft" },
        { t: "Royal Seal", d: "A gold-plated lock requires a special key to unlock the final floor.", i: "Golden Key", tr: "Gold-Plated Lock" },
        { t: "White Maze", d: "The hallways are identical. You need to mark your path to find the exit.", i: "Blue Chalk", tr: "Hallway Walls" },
        { t: "Hidden Dial", d: "The access panel is missing its handle; only a tiny hole remains.", i: "Hand Drill", tr: "Access Hole" },
        { t: "North Point", d: "The room is spinning. You need to find the northern exit.", i: "Compass", tr: "Spinning Room" },
        { t: "Hay Blockade", d: "A massive bale of hay is blocking the conveyor belt.", i: "Pitchfork", tr: "Hay Bale" },
        { t: "Light Split", d: "A single white beam needs to be split into colors to hit three sensors.", i: "Glass Prism", tr: "White Beam" },
        { t: "Final Tumble", d: "The core is exposed. You must carefully pick the final tumblers.", i: "Lockpick", tr: "Core Tumblers" }
    ];

    let currentLvl = 0;
    let selectedItem = null;
    let health = 100;
    let timeLeft = 600;

    function init() {
        const grid = document.getElementById('inv-grid');
        inventoryData.forEach(item => {
            const slot = document.createElement('div');
            slot.className = 'item-slot';
            slot.innerHTML = `<span>${item.icon}</span><div class="item-label">${item.name}</div>`;
            slot.onclick = () => {
                document.querySelectorAll('.item-slot').forEach(s => s.classList.remove('selected'));
                slot.classList.add('selected');
                selectedItem = item.name;
                document.getElementById('cur-item-name').innerText = item.name.toUpperCase();
                toggleDrawer();
            };
            grid.appendChild(slot);
        });
        loadLevel();
        startTimer();
    }

    function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); }

    function loadLevel() {
        const data = gameLevels[currentLvl];
        document.getElementById('lvl-title').innerText = `NODE: ${data.t}`;
        document.getElementById('scene-text').innerText = data.d;
        document.getElementById('lvl-count').innerText = currentLvl + 1;
        
        const target = document.getElementById('target-list');
        target.innerHTML = `<option value="">-- SELECT TARGET --</option>
                            <option value="${data.tr}">${data.tr}</option>
                            <option value="Manual Pushing">Manual Force</option>`;
    }

    function processMove() {
        const data = gameLevels[currentLvl];
        const target = document.getElementById('target-list').value;

        if (!selectedItem) {
            alert("OPEN UTILITY BELT AND SELECT AN ITEM!");
            return;
        }

        if (selectedItem === data.i && target === data.tr) {
            currentLvl++;
            if (currentLvl >= 30) {
                winGame();
            } else {
                loadLevel();
            }
        } else {
            health -= 10;
            document.getElementById('hp').innerText = health + "%";
            document.body.classList.add('shake');
            if (window.navigator.vibrate) window.navigator.vibrate(200); // Mobile Vibration
            setTimeout(() => document.body.classList.remove('shake'), 300);
            if (health <= 0) gameOver("SYSTEM SHUTDOWN");
        }
    }

    function startTimer() {
        const timer = setInterval(() => {
            if(timeLeft <= 0) return;
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if (timeLeft === 0) gameOver("TIME EXPIRED");
        }, 1000);
    }

    function gameOver(msg) {
        document.body.innerHTML = `<div style="text-align:center; padding-top:100px;"><h1>${msg}</h1><button onclick="location.reload()" style="padding:20px; background:var(--neon); border:none;">REBOOT</button></div>`;
    }

    function winGame() {
        document.body.innerHTML = `<div style="text-align:center; padding-top:100px; color:var(--neon);"><h1>BREACH COMPLETE</h1><p>The Vault is yours.</p></div>`;
    }

    init();
</script>
</body>
</html>
