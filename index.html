<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL BREACH: 30 LEVELS</title>
    <style>
        :root {
            --neon: #00ff41; /* Matrix Green */
            --bg: #050505;
            --warn: #ffcc00;
            --crit: #ff0055;
        }
        body {
            background-color: var(--bg);
            color: var(--neon);
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }
        /* Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #game-container {
            width: 1000px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            border: 2px solid var(--neon);
            padding: 20px;
            box-shadow: 0 0 15px var(--neon);
            background: #0a0a0a;
            position: relative;
        }

        .stats-bar {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--neon);
            padding-bottom: 10px;
            font-weight: bold;
        }

        .inventory-panel {
            border-right: 1px solid var(--neon);
            padding-right: 15px;
            height: 500px;
            overflow-y: scroll;
        }

        .item-btn {
            display: block;
            width: 100%;
            background: transparent;
            color: var(--neon);
            border: 1px solid var(--neon);
            padding: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
        }
        .item-btn:hover { background: rgba(0, 255, 65, 0.2); }
        .item-btn.active { background: var(--neon); color: #000; }

        .main-display { padding: 10px; position: relative; }
        #scene-text { height: 120px; font-size: 1.2rem; }
        
        .action-zone {
            margin-top: 30px;
            border-top: 1px dashed var(--neon);
            padding-top: 20px;
        }

        #target-list {
            background: #000;
            color: var(--neon);
            border: 1px solid var(--neon);
            padding: 10px;
            width: 100%;
            margin-bottom: 20px;
        }

        .execute-btn {
            width: 100%;
            padding: 20px;
            background: var(--neon);
            color: #000;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
        }

        #log {
            margin-top: 20px;
            font-size: 0.9rem;
            height: 60px;
            color: var(--warn);
        }

        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            100% { transform: translateX(0); }
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats-bar">
        <div>SYSTEM STATUS: ACTIVE</div>
        <div>TIME REMAINING: <span id="timer">05:00</span></div>
        <div>INTEGRITY: <span id="hp">100%</span></div>
        <div>LVL: <span id="lvl-count">1</span>/30</div>
    </div>

    <div class="inventory-panel" id="inv-panel">
        </div>

    <div class="main-display" id="stage">
        <h2 id="lvl-title">LOADING...</h2>
        <div id="scene-text">Initializing security nodes...</div>

        <div class="action-zone">
            <select id="target-list"></select>
            <button class="execute-btn" onclick="processMove()">EXECUTE COMMAND</button>
            <div id="log">> System ready. Select parameters.</div>
        </div>
    </div>
</div>

<script>
    const items = ["Sledgehammer", "Lockpick", "Silk Rope", "Vial of Acid", "Golden Key", "Magnifying Glass", "Wooden Plank", "Steel File", "Heavy Grease", "Meat Scrap", "Small Magnet", "Glass Prism", "Flint & Steel", "Iron Crowbar", "Hand Drill", "Rubber Gloves", "Compass", "Jar of Honey", "Bag of Sand", "Metal Shield", "Whistle", "Blue Chalk", "Empty Bucket", "Pitchfork", "Silver Mirror", "Insulated Pliers", "Leather Belt", "Old Bone", "Bamboo Pole", "Diamond Cutter"];
    
    const gameData = [
        { t: "The Barrier", d: "A granite boulder seals the hatch. It's wedged tight.", i: "Iron Crowbar", tr: "Granite Boulder" },
        { t: "Fused Lock", d: "The padlock is a lump of rusted slag. No key will fit.", i: "Vial of Acid", tr: "Rusted Padlock" },
        { t: "The Gap", d: "A floor plate is missing, leaving a 10ft drop into spikes.", i: "Wooden Plank", tr: "10ft Drop" },
        { t: "Glittering Depths", d: "Something metallic is at the bottom of a narrow, dry pipe.", i: "Small Magnet", tr: "Narrow Pipe" },
        { t: "The Guardian", d: "A cyber-hound blocks the corridor, sensors tracking you.", i: "Old Bone", tr: "Cyber-Hound" },
        { t: "Fragile Wall", d: "The ventilation cover is bricked over with loose mortar.", i: "Sledgehammer", tr: "Bricked Vent" },
        { t: "Laser Grid", d: "A single laser beam is blocking the door sensor.", i: "Silver Mirror", tr: "Laser Beam" },
        { t: "Overhead Switch", d: "The power switch is 12 feet high in the rafters.", i: "Bamboo Pole", tr: "Power Switch" },
        { t: "Live Terminal", d: "The keypad is sparking with high-voltage electricity.", i: "Rubber Gloves", tr: "Sparking Keypad" },
        { t: "Bio-Lock", d: "The sensor requires a specific frequency to oscillate.", i: "Whistle", tr: "Frequency Sensor" },
        { t: "Seized Gears", d: "The door gears are dry and screaming with friction.", i: "Heavy Grease", tr: "Dry Gears" },
        { t: "Hidden Script", d: "The exit code is etched into a grain of sand on the desk.", i: "Magnifying Glass", tr: "Grain of Sand" },
        { t: "Slippery Floor", d: "The floor is coated in frictionless gel. You can't move.", i: "Bag of Sand", tr: "Frictionless Gel" },
        { t: "The Hungry Orc", d: "A dungeon guard is complaining about his missed lunch.", i: "Meat Scrap", tr: "Dungeon Guard" },
        { t: "The Fire Door", d: "Flames are shooting from the wall. You need a heat break.", i: "Metal Shield", tr: "Wall Flames" },
        { t: "The Dark Room", d: "It's pitch black. You need a primitive spark.", i: "Flint & Steel", tr: "Primitive Spark" },
        { t: "Submerged Lever", d: "The lever is at the bottom of a tank of toxic sludge.", i: "Empty Bucket", tr: "Sludge Tank" },
        { t: "The Glass Safe", d: "The master drive is behind 2-inch thick tempered glass.", i: "Diamond Cutter", tr: "Tempered Glass" },
        { t: "Tangled Wires", d: "A mess of copper wires prevents the door from closing.", i: "Insulated Pliers", tr: "Copper Wires" },
        { t: "The Loose Bar", d: "One iron bar in the cage is thinner than the rest.", i: "Steel File", tr: "Thin Iron Bar" },
        { t: "The Giant Nut", d: "A massive hexagonal bolt needs to be turned.", i: "Leather Belt", tr: "Hexagonal Bolt" },
        { t: "The Echo Chamber", d: "The sound-activated lock needs a distraction far away.", i: "Jar of Honey", tr: "Distant Wall" },
        { t: "Deep Trench", d: "The key is at the bottom of a 30ft pit.", i: "Silk Rope", tr: "30ft Pit" },
        { t: "The King's Gate", d: "A literal golden lock requires a literal golden match.", i: "Golden Key", tr: "Golden Lock" },
        { t: "The Maze", d: "The corridors are identical. You need to mark your path.", i: "Blue Chalk", tr: "Identical Walls" },
        { t: "Small Screw", d: "The panel is held by a tiny screw with no head.", i: "Hand Drill", tr: "No-head Screw" },
        { t: "The Compass Room", d: "Magnetic interference makes you dizzy. Find True North.", i: "Compass", tr: "Magnetic Field" },
        { t: "Bale Obstacle", d: "A giant bale of hay is blocking the conveyor belt.", i: "Pitchfork", tr: "Hay Bale" },
        { t: "White Light", d: "A single beam needs to be split into a rainbow.", i: "Glass Prism", tr: "Single Beam" },
        { t: "The Master Lock", d: "The final tumblers are exposed. Use your finest skill.", i: "Lockpick", tr: "Exposed Tumblers" }
    ];

    let currentLvl = 0;
    let selectedItem = null;
    let health = 100;
    let timeLeft = 300;

    function init() {
        const panel = document.getElementById('inv-panel');
        items.sort().forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'item-btn';
            btn.innerText = item;
            btn.onclick = () => {
                document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedItem = item;
            };
            panel.appendChild(btn);
        });
        loadLevel();
        startTimer();
    }

    function loadLevel() {
        const data = gameData[currentLvl];
        document.getElementById('lvl-title').innerText = data.t;
        document.getElementById('scene-text').innerText = data.d;
        document.getElementById('lvl-count').innerText = currentLvl + 1;
        
        const target = document.getElementById('target-list');
        target.innerHTML = `<option value="">-- SELECT TARGET --</option>
                            <option value="${data.tr}">${data.tr}</option>
                            <option value="Self">Attempt Manually</option>
                            <option value="The Air">The Air</option>`;
    }

    function processMove() {
        const data = gameData[currentLvl];
        const target = document.getElementById('target-list').value;
        const log = document.getElementById('log');

        if (!selectedItem) {
            log.innerText = "> ERROR: No item selected in Utility Belt.";
            return;
        }

        if (selectedItem === data.i && target === data.tr) {
            log.innerText = `> SUCCESS: ${selectedItem} used on ${target}. Proceeding...`;
            currentLvl++;
            if (currentLvl >= 30) {
                winGame();
            } else {
                setTimeout(loadLevel, 1000);
            }
        } else {
            health -= 10;
            document.getElementById('hp').innerText = health + "%";
            document.getElementById('game-container').classList.add('shake');
            log.innerText = `> CRITICAL FAILURE: Anti-tamper triggered! -10% Integrity.`;
            setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 500);
            if (health <= 0) gameOver("SYSTEM CRITICAL FAILURE");
        }
    }

    function startTimer() {
        const timerInt = setInterval(() => {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if (timeLeft <= 0) {
                clearInterval(timerInt);
                gameOver("TIME EXPIRED");
            }
        }, 1000);
    }

    function gameOver(reason) {
        document.getElementById('stage').innerHTML = `<h1 style="color:var(--crit)">${reason}</h1><button onclick="location.reload()">REBOOT SYSTEM</button>`;
    }

    function winGame() {
        document.getElementById('stage').innerHTML = `<h1 style="color:var(--neon)">VAULT BREACHED. FREEDOM ATTAINED.</h1><p>You completed 30 nodes of logic.</p>`;
    }

    init();
</script>
</body>
</html>
